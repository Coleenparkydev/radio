<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Kana Trainer</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="app">
  <h1>Kana Trainer</h1>

  <div class="controls">
    <select id="type">
      <option value="hiragana">Hiragana</option>
      <option value="katakana">Katakana</option>
    </select>

    <select id="stage">
      <option value="basic">Basic</option>
      <option value="dakuten">Dakuten</option>
      <option value="yoon">Yoon</option>
      <option value="all">All</option>
    </select>
  </div>

  <button onclick="playAudio()">🔊 Play Sound</button>

  <div class="romaji" id="romaji">a</div>

  <div class="choices" id="choices"></div>

  <div class="feedback" id="feedback"></div>

  <button class="next" onclick="nextQuestion()">Next</button>
</div>

<script src="script.js"></script>
</body>
</html>
